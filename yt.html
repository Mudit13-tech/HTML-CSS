<!DOCTYPE html>
<html>
    <head>
    <title>Youtube clone</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        p{
            font-family: Roboto, Arial;
        }
        .search-bar {
            width:400px;
            font-size:18px;
            margin-top:10px;
            margin-bottom :20px;
            margin-left:500px;
            margin-right:100px;
            display:block;
           
        }
        .img1{
            width:36px;
            border-radius: 50%;
        }
  
        .v1 {
            width:400px;
            display:inline-block; 
            margin-left:20px;
            vertical-align:top;
        
        }
        .thumb1 {
            width:400px;
            height:224px;
            display:inline-block;
            border-radius:18px;
            margin-top:5px;
            margin-bottom:5px;
                    
        }
        .channel-picture{
            display:inline-block; 
            width:40px;   
            vertical-align:top;
        }
        .video-info{
            display:inline-block;
            width: 350px;
            margin-left:2px;
            size:20px;
            
        }
        .t1 {
            display:inline-block;
            margin-top:0px;
            margin-bottom:0px;     
            color:rgb(21, 20, 20);
            font-size:18px;
            font-weight:500;   
                
        }
         .p1{
            color:rgb(80, 79, 79);
            font-size:12px;
            margin-top:8px;
            margin-bottom:0px;    
               
            
        }
    
        .s1{         
            color:rgb(80, 79, 79);
            font-size:12px;
            margin-top:3px;
            
        }
       

    </style>
    </head>
    <body>
        <input class="search-bar" type="text" placeholder="Search">
        <div class="v1">
            <div>
            <img class="thumb1" src="t1.jpeg">        
            </div> 

            <div class="channel-picture">
            <img class="img1" src="https://yt3.googleusercontent.com/ytc/AIdro_muOaJYnFrZ-ky-azsSN18M9D7vt0AdLJZPYebF_Hl8AVlp=s160-c-k-c0x00ffffff-no-rj">
            </div>

            <div class="video-info">
            <p class="t1">Shocking first impressions of Japan</p>
            <p class="p1">Passenger Paramveer</p>
            <p class="s1">1M views &#183 7 days ago</p>
            </div>
        </div>
        
        
        <div class="v1">
            <div>
            <img class="thumb1" src="t2.jpeg">
            </div>

            <div class="channel-picture">
            <img class="img1" src="https://yt3.googleusercontent.com/UCRiFbTuBfejdfPQbNwWJr9Yw5FTisWcCtapt-vVVFxUltX1QdEYryQKcUxF6CpO7_F3DH4M=s160-c-k-c0x00ffffff-no-rj">
            </div>

            <div class="video-info">
            <p class="t1">Can You Profit from a First Class Flight</p>
            <p class="p1">Jake Pembrook</p>
            <p class="s1">1.5M views &#183 1 day ago</p>
            </div>
        </div>      
    </body>     
</html>
